[workspace]
authors = ["ZHU Yuhao (朱宇浩) <dr.yuhao.zhu@outlook.com>"]
channels = [
  "https://conda.modular.com/max",
  "https://repo.prefix.dev/modular-community",
  "conda-forge",
]
description = "A command-line argument parser library for Mojo"
license = "Apache-2.0"
name = "argmojo"
platforms = ["osx-arm64", "linux-64"]
readme = "README.md"
version = "0.3.0"

[dependencies]
mojo = "==0.26.2"

[tasks]
# format the code
format = "mojo format ./src ./tests ./examples"

# compile the package
package = "mojo package src/argmojo -o argmojo.mojopkg"

# run tests
test = """\
    pixi run format \
    && pixi run package \
    && mojo run -I src -D ASSERT=all tests/test_parse.mojo \
    && mojo run -I src -D ASSERT=all tests/test_groups.mojo \
    && mojo run -I src -D ASSERT=all tests/test_collect.mojo \
    && mojo run -I src -D ASSERT=all tests/test_help.mojo \
    && mojo run -I src -D ASSERT=all tests/test_extras.mojo \
    && mojo run -I src -D ASSERT=all tests/test_subcommands.mojo \
    && mojo run -I src -D ASSERT=all tests/test_negative_numbers.mojo \
    && mojo run -I src -D ASSERT=all tests/test_persistent.mojo \
    && mojo run -I src -D ASSERT=all tests/test_typo_suggestions.mojo \
    && mojo run -I src -D ASSERT=all tests/test_completion.mojo \
    && mojo run -I src -D ASSERT=all tests/test_implies.mojo \
    && mojo run -I src -D ASSERT=all tests/test_const_require_equals.mojo \
    && mojo run -I src -D ASSERT=all tests/test_remainder_known.mojo \
    && mojo run -I src -D ASSERT=all tests/test_fullwidth.mojo \
    && mojo run -I src -D ASSERT=all tests/test_groups_help.mojo \
    && mojo run -I src -D ASSERT=all tests/test_prompt.mojo < /dev/null \
    && mojo run -I src -D ASSERT=all tests/test_parents.mojo \
    && mojo run -I src -D ASSERT=all tests/test_usage.mojo \
    && mojo run -I src -D ASSERT=all tests/test_confirmation.mojo < /dev/null \
    && mojo run -I src -D ASSERT=all tests/test_password.mojo < /dev/null"""
# NOTE: test_response_file.mojo is excluded — response file expansion
# is temporarily disabled to work around a Mojo compiler deadlock
# with -D ASSERT=all.  Re-enable when the compiler bug is fixed.

# build example binaries (parallel, fail if any build fails)
build = """pixi run package && bash -c '\
  pids=(); \
  mojo build -I src examples/mgrep.mojo -o mgrep & pids+=($!); \
  mojo build -I src examples/mgit.mojo  -o mgit  & pids+=($!); \
  mojo build -I src examples/demo.mojo  -o demo  & pids+=($!); \
  mojo build -I src examples/yu.mojo    -o yu    & pids+=($!); \
  rc=0; for p in "${pids[@]}"; do wait "$p" || rc=1; done; exit $rc'
"""

# run (debug mode) example binaries (parallel, fail if any run fails)
# Uses --help so examples with required positional args exit cleanly.
# The purpose is to exercise command construction (registration-time
# validation), not argument parsing.
debug = """pixi run package && bash -c '\
  pids=(); \
  mojo run -I src -D ASSERT=all examples/mgrep.mojo -- --help & pids+=($!); \
  mojo run -I src -D ASSERT=all examples/mgit.mojo  -- --help & pids+=($!); \
  mojo run -I src -D ASSERT=all examples/demo.mojo  -- --help & pids+=($!); \
  mojo run -I src -D ASSERT=all examples/yu.mojo    -- --help & pids+=($!); \
  rc=0; for p in "${pids[@]}"; do wait "$p" || rc=1; done; exit $rc'
"""

# clean build artifacts
clean = "rm -f argmojo.mojopkg mgrep mgit demo yu"
